<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Isometric cube -->
  <!-- Top face -->
  <polygon points="32,8 56,20 32,32 8,20" fill="#1566d6"/>
  <!-- Left face -->
  <polygon points="8,20 32,32 32,56 8,44" fill="#0d4ea6"/>
  <!-- Right face -->
  <polygon points="32,32 56,20 56,44 32,56" fill="#1050b0"/>
  <!-- Edges -->
  <polygon points="32,8 56,20 32,32 8,20" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="8,20 32,32 32,56 8,44" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
  <polygon points="32,32 56,20 56,44 32,56" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linejoin="round"/>
</svg>
